var COL='#111';

var FONT_F2=F2+'px "GDT","Times New Roman","仿宋","SimSun",serif';

function fmtDev(v){
  if(v===0) return '0';
  return v.toFixed(3);
}

function getTolValues(tol){
  if(Array.isArray(tol)) return {upper: Math.max(tol[0],tol[1]), lower: Math.min(tol[0],tol[1]), symmetric: false};
  return {upper: tol, lower: -tol, symmetric: true};
}

function arrow(ctx,x,y,dir,len){
  var L=len||8, W=L*0.18;
  ctx.fillStyle=COL; ctx.strokeStyle=COL; ctx.lineWidth=0.4;
  ctx.beginPath();
  if(dir==='up'){ctx.moveTo(x,y);ctx.lineTo(x-W,y+L);ctx.lineTo(x+W,y+L);}
  if(dir==='down'){ctx.moveTo(x,y);ctx.lineTo(x-W,y-L);ctx.lineTo(x+W,y-L);}
  if(dir==='left'){ctx.moveTo(x,y);ctx.lineTo(x+L,y-W);ctx.lineTo(x+L,y+W);}
  if(dir==='right'){ctx.moveTo(x,y);ctx.lineTo(x-L,y-W);ctx.lineTo(x-L,y+W);}
  ctx.closePath();ctx.fill();ctx.stroke();
}

function centerLine(ctx,x1,y1,x2,y2){
  ctx.strokeStyle='#cc0000'; ctx.lineWidth=0.7; ctx.setLineDash([18,3,3,3]);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();

}

function hatchWithClip(ctx, drawClipFn, angleDeg, gap){
  ctx.save();
  ctx.beginPath();
  drawClipFn(ctx);
  ctx.clip('evenodd');
  ctx.strokeStyle=COL; ctx.lineWidth=0.3;
  var ext = 600;
  var g = gap || 14;
  var angle = (angleDeg||45) * Math.PI / 180;
  var dx = Math.cos(angle), dy = Math.sin(angle);
  for(var i=-ext;i<ext;i+=g){
    var sx = -ext;
    var sy = i - ext;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + dx*ext*4, sy + dy*ext*4);
    ctx.stroke();
  }
  ctx.restore();
}

function drawTolText(ctx, cx, cy, size, tolV, align){
  var mainW, tolStrW = 0;
  ctx.font=FONT_F1;
  mainW = ctx.measureText(size).width;
  var isSym = tolV && tolV.symmetric;
  var upperStr = '', lowerStr = '';
  if(tolV){
    if(isSym){
      upperStr = '±' + fmtDev(tolV.upper);
      ctx.font=FONT_F2; tolStrW = ctx.measureText(upperStr).width;
    } else {
      upperStr = (tolV.upper>=0?'+':'') + fmtDev(tolV.upper);
      lowerStr = (tolV.lower>=0?'+':'') + fmtDev(tolV.lower);
      ctx.font=FONT_F2; tolStrW = Math.max(ctx.measureText(upperStr).width, ctx.measureText(lowerStr).width);
    }
  }
  var totalW = mainW + (tolV ? 3 + tolStrW : 0);
  var startX;
  if(align==='center') startX = cx - totalW/2;
  else if(align==='right') startX = cx - totalW;
  else startX = cx;
  ctx.fillStyle=COL; ctx.font=FONT_F1;
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(size, startX, cy);
  if(!tolV) return totalW;
  var tx = startX + mainW + 3;
  ctx.font=FONT_F2; ctx.textAlign='left';
  if(isSym){
    ctx.textBaseline='bottom';
    ctx.fillText(upperStr, tx, cy - 1);
  } else {
    ctx.textBaseline='bottom'; ctx.fillText(upperStr, tx, cy - 2);
    ctx.textBaseline='top'; ctx.fillText(lowerStr, tx, cy + 2);
  }
  return totalW;
}

function dimDiameter(ctx, cx, cy, rPx, d, side){
  var angle = side==='left' ? Math.PI * 5/6 : Math.PI / 6;
  var px = cx + rPx * Math.cos(angle);
  var py = cy - rPx * Math.sin(angle);
  var outAngle = Math.atan2(py - cy, px - cx);
  var outDx = Math.cos(outAngle), outDy = Math.sin(outAngle);
  var slantLen = 25;
  var bendX = px + outDx * slantLen;
  var bendY = py + outDy * slantLen;
  var hLen = 50;
  var endX = side==='left' ? bendX - hLen : bendX + hLen;
  var endY = bendY;
  ctx.strokeStyle=COL; ctx.lineWidth=0.5; ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(px, py); ctx.lineTo(bendX, bendY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(bendX, bendY); ctx.lineTo(endX, endY);
  ctx.stroke();
  var aL=7, aW=aL*0.18;
  ctx.fillStyle=COL; ctx.strokeStyle=COL; ctx.lineWidth=0.4;
  var adx=outDx, ady=outDy;
  var anx=-ady, any=adx;
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(px + adx*aL + anx*aW, py + ady*aL + any*aW);
  ctx.lineTo(px + adx*aL - anx*aW, py + ady*aL - any*aW);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle=COL; ctx.font=FONT_F1;
  ctx.textBaseline='bottom'; ctx.textAlign='center';
  var textX = (bendX + endX) / 2;
  var textY = Math.min(bendY, endY) - 2;
  ctx.fillText('⌀' + d, textX, textY);
}

  if(!tolV) return;
  var mainW = ctx.measureText(size).width;
  var tolX = al==='right' ? tx + mainW + 3 : tx - mainW - 3;
  var tolAl = al==='right' ? 'left' : 'right';
  ctx.font=FONT_F2; ctx.textAlign = tolAl;
  if(tolV.symmetric){
    var symStr = '±'+fmtDev(tolV.upper);
    ctx.textBaseline='bottom'; ctx.fillText(symStr, tolX, mid - 1);
  } else {
    var us = (tolV.upper>=0?'+':'')+fmtDev(tolV.upper);
    var ls = (tolV.lower>=0?'+':'')+fmtDev(tolV.lower);
    ctx.textBaseline='bottom'; ctx.fillText(us, tolX, mid - 2);
    ctx.textBaseline='top'; ctx.fillText(ls, tolX, mid + 2);
  }
}

function dimV_tol_through(ctx, y1, y2, x1, x2, textX, size, tolV){
  var mid = (y1+y2)/2;
  var extLen = 18 + 149;
  var dimX = Math.max(x1, x2) + extLen;
  ctx.strokeStyle=COL; ctx.lineWidth=1.0; ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(x1, y1); ctx.lineTo(dimX, y1);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2, y2); ctx.lineTo(dimX, y2);
  ctx.stroke();
  ctx.lineWidth=0.5;
  ctx.beginPath();
  ctx.moveTo(dimX, y1); ctx.lineTo(dimX, y2);
  ctx.stroke();
  arrow(ctx, dimX, y1, 'down', 7);
  arrow(ctx, dimX, y2, 'up', 7);
  var tx = textX + 5;
  ctx.fillStyle=COL; ctx.textAlign = 'left';
  ctx.font=FONT_F1; ctx.textBaseline='middle';
  ctx.fillText(size, tx, mid);
  if(!tolV) return;
  var mainW = ctx.measureText(size).width;
  var tolX = tx + mainW + 3;
  ctx.font=FONT_F2; ctx.textAlign = 'left';
  if(tolV.symmetric){
    var symStr = '±'+fmtDev(tolV.upper);
    ctx.textBaseline='bottom'; ctx.fillText(symStr, tolX, mid - 1);
  } else {
    var us = (tolV.upper>=0?'+':'')+fmtDev(tolV.upper);
    var ls = (tolV.lower>=0?'+':'')+fmtDev(tolV.lower);
    ctx.textBaseline='bottom'; ctx.fillText(us, tolX, mid - 2);
    ctx.textBaseline='top'; ctx.fillText(ls, tolX, mid + 2);
  }
}

function showToast(msg){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 1500);
}

function draw(){
  var canvas=document.getElementById('c');
  var dpr=window.devicePixelRatio||1;
  var BASE_W = 1200, BASE_H = 800;
  var maxW = window.innerWidth - 32;
  var maxH = window.innerHeight - 160;
  var cssScale = Math.min(maxW / BASE_W, maxH / BASE_H);
  if(cssScale > 1) cssScale = 1;
  var cssW = Math.round(BASE_W * cssScale);
  var cssH = Math.round(BASE_H * cssScale);
  canvas.width = BASE_W * dpr;
  canvas.height = BASE_H * dpr;
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  var ctx=canvas.getContext('2d');
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr, dpr);
  var vw = BASE_W, vh = BASE_H;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,vw,vh);

  var curD=parseFloat(document.getElementById('diaInput').value);
  var row=findKeyway(curD);
  var fitDef={loose:{shaft:'H9',hub:'D10'},normal:{shaft:'N9',hub:'JS9'},tight:{shaft:'P9',hub:'P9'}}[curFit];
  if(isNaN(curD)||curD<6||curD>500||!row){
    ctx.fillStyle='#dc2626'; ctx.font='14px "Microsoft YaHei",sans-serif'; ctx.textAlign='center';
    ctx.fillText('请输入 6~500 范围内的轴径',vw/2,vh/2); return;
  }
  var tol=KEY_TOL[row.b];
  var shaftTol=tol[fitDef.shaft], hubTol=tol[fitDef.hub];
  var b=row.b, h=row.h, t1=row.t1, t2=row.t2, t1tol=row.t1tol, t2tol=row.t2tol, r1=row.r1, r2=row.r2;
  var R=curD/2;
  var sTolV = getTolValues(shaftTol);
  var hTolV = getTolValues(hubTol);

  var halfW = vw / 2;
  var DIM_TOP = 50, DIM_BOT = 40, DIM_LEFT = 55, DIM_RIGHT = 120;
  var sectionGap = 30;
  var availW = halfW - DIM_LEFT - DIM_RIGHT - sectionGap - 20;
  var topUI = 52;
  var availH = vh - topUI - DIM_TOP - DIM_BOT - 40;
  var maxR_px = Math.min(availW, availH) / 2;
  maxR_px = Math.min(maxR_px, 180);
  var sc = maxR_px / R;
  var minSc = 12;
  if(sc < minSc) sc = minSc;

  var SHAPE_SCALE = 0.56;
  var rPx = R * sc * SHAPE_SCALE;
  var bPx = (b/2) * sc * SHAPE_SCALE;
  var t1Px = t1 * sc * SHAPE_SCALE;
  var t2Px = t2 * sc * SHAPE_SCALE;

  var holeR = rPx;
  var hubRpx = Math.max(holeR + t2Px + 5, rPx * 2.0 - 67);

  var gap = 80;
  var totalW = rPx * 2 + gap + hubRpx * 2;
  var startX = Math.max(DIM_LEFT + 10, (vw - totalW) / 2);
  var sectionCy = topUI + DIM_TOP + Math.max(rPx, hubRpx) + 75;

  var axCx = startX + rPx;
  var axCy = sectionCy;
  var hubCx = axCx + rPx + gap + hubRpx;
  var hubCy = sectionCy;

  var clExt = 6;

  // 左图：轴截面
  centerLine(ctx, axCx - rPx - clExt, axCy, axCx + rPx + clExt, axCy);
  centerLine(ctx, axCx, axCy - rPx - clExt, axCx, axCy + rPx + clExt);

  hatchWithClip(ctx, function(c){
    c.arc(axCx, axCy, rPx, 0, Math.PI*2);
    c.moveTo(axCx-bPx, axCy-rPx);
    c.lineTo(axCx+bPx, axCy-rPx);
    c.lineTo(axCx+bPx, axCy-rPx+t1Px);
    c.lineTo(axCx-bPx, axCy-rPx+t1Px);
    c.closePath();
  }, 45, 14);

  ctx.strokeStyle=COL; ctx.lineWidth=1.8; ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(axCx, axCy, rPx, 0, Math.PI*2); ctx.stroke();

  var slotL=axCx-bPx, slotR=axCx+bPx;
  var slotTop=axCy-rPx, slotBot=slotTop+t1Px;
  var shaftWallTop = axCy - Math.sqrt(Math.max(0, rPx*rPx - bPx*bPx));
  ctx.strokeStyle=COL; ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.moveTo(slotL, shaftWallTop); ctx.lineTo(slotL, slotBot);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(slotL,slotBot); ctx.lineTo(slotR,slotBot);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(slotR, shaftWallTop); ctx.lineTo(slotR, slotBot);
  ctx.stroke();

  // 右图：轮毂截面
  centerLine(ctx, hubCx - hubRpx - clExt, hubCy, hubCx + hubRpx + clExt, hubCy);
  centerLine(ctx, hubCx, hubCy - hubRpx - clExt, hubCx, hubCy + hubRpx + clExt);

  var hubSlotL = hubCx - bPx;
  var hubSlotR = hubCx + bPx;
  var hubSlotInner = hubCy - holeR;
  var hubSlotOuter = hubSlotInner - t2Px;

  hatchWithClip(ctx, function(c){
    c.arc(hubCx, hubCy, hubRpx, 0, Math.PI*2);
    c.arc(hubCx, hubCy, holeR, 0, Math.PI*2, true);
    c.moveTo(hubSlotL, hubSlotOuter);
    c.lineTo(hubSlotR, hubSlotOuter);
    c.lineTo(hubSlotR, hubSlotInner);
    c.lineTo(hubSlotL, hubSlotInner);
    c.closePath();
  }, -45, 14);

  ctx.strokeStyle=COL; ctx.lineWidth=1.8; ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(hubCx, hubCy, hubRpx, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle=COL; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.arc(hubCx, hubCy, holeR, 0, Math.PI*2); ctx.stroke();

  ctx.strokeStyle=COL; ctx.lineWidth=1.2; ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(hubSlotL, hubSlotOuter); ctx.lineTo(hubSlotL, hubCy + holeR);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(hubSlotL, hubSlotOuter); ctx.lineTo(hubSlotR, hubSlotOuter);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(hubSlotR, hubSlotOuter); ctx.lineTo(hubSlotR, hubCy + holeR);
  ctx.stroke();

  // 标注
  dimH_tol(ctx, slotL, slotR, slotTop, 35, b, sTolV, 11);
  dimDiameter(ctx, axCx, axCy, rPx, curD, 'left');
  dimV_simple(ctx, slotTop, slotBot, axCx - rPx, 50, t1+'', 'left');
  dimV_tol_through(ctx, slotBot, axCy+rPx, slotR, axCx, axCx + rPx + 8,
    '('+(curD-t1).toFixed(1)+')', {upper:0,lower:-t1tol,symmetric:false});

  ctx.fillStyle=COL; ctx.font=F2+'px "GDT","Times New Roman","SimSun",serif';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText('r '+r1+'~'+r2, slotR+10, slotBot+6);

  dimH_tol(ctx, hubSlotL, hubSlotR, hubSlotOuter, 35, b, hTolV, 11);
  dimDiameter(ctx, hubCx, hubCy, holeR, curD, 'right');
  dimV_simple(ctx, hubSlotOuter, hubSlotInner, hubCx - hubRpx, 50, t2+'', 'left');
  dimV_tol_through(ctx, hubSlotInner, hubCy+hubRpx, hubSlotR, hubCx, hubCx + hubRpx + 8,
    '('+(curD+t2).toFixed(1)+')', {upper:t2tol,lower:0,symmetric:false});

  ctx.fillStyle='#555'; ctx.font='bold 16px "Microsoft YaHei",sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('轴', axCx, axCy+rPx+32);
  ctx.fillText('轮毂', hubCx, hubCy+hubRpx+32);
}

document.getElementById('diaInput').addEventListener('input',draw);
document.querySelectorAll('.fit-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.fit-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active'); curFit=btn.dataset.fit; draw();
  });
});
window.addEventListener('resize',draw);
draw();

document.getElementById('btnCopy').addEventListener('click', function(){
  var curD = parseFloat(document.getElementById('diaInput').value);
  var row = findKeyway(curD);
  if(!row){ showToast('无效轴径'); return; }
  var fitDef={loose:{shaft:'H9',hub:'D10'},normal:{shaft:'N9',hub:'JS9'},tight:{shaft:'P9',hub:'P9'}}[curFit];
  var tol = KEY_TOL[row.b];
  var shaftTol = tol[fitDef.shaft], hubTol = tol[fitDef.hub];
  var sTolV = getTolValues(shaftTol);
  var hTolV = getTolValues(hubTol);
  function fmtTol(tv){
    if(tv.symmetric) return '±' + fmtDev(tv.upper);
    return (tv.upper>=0?'+':'')+fmtDev(tv.upper)+' / '+(tv.lower>=0?'+':'')+fmtDev(tv.lower);
  }
  var text = 'GB/T 1095-2003 键槽尺寸\n';
  text += '轴径 d = ' + curD + ' mm\n';
  text += '键尺寸 b×h = ' + row.b + '×' + row.h + ' mm\n';
  text += '配合: ' + fitDef.shaft + '/' + fitDef.hub + '\n';
  text += '---\n';
  text += '轴键槽:\n';
  text += '  b = ' + row.b + ' (' + fmtTol(sTolV) + ')\n';
  text += '  t₁ = ' + row.t1 + ' (+' + row.t1tol + ')\n';
  text += '  (d-t₁) = ' + (curD-row.t1).toFixed(1) + ' (-' + row.t1tol + ')\n';
  text += '  r = ' + row.r1 + '~' + row.r2 + '\n';
  text += '轮毂键槽:\n';
  text += '  b = ' + row.b + ' (' + fmtTol(hTolV) + ')\n';
  text += '  t₂ = ' + row.t2 + ' (+' + row.t2tol + ')\n';
  text += '  (d+t₂) = ' + (curD+row.t2).toFixed(1) + ' (+' + row.t2tol + ')\n';
  text += '  r = ' + row.r1 + '~' + row.r2;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){ showToast('已复制到剪贴板'); }, function(){ fallbackCopy(text); });
  } else { fallbackCopy(text); }
});

function fallbackCopy(text){
  var ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); showToast('已复制到剪贴板'); }
  catch(e){ showToast('复制失败'); }
  document.body.removeChild(ta);
}
